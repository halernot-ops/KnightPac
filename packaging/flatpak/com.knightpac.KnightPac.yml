# Flatpak manifest template — not built automatically
app-id: com.knightpac.KnightPac
runtime: org.kde.Platform
runtime-version: "6.6"
sdk: org.kde.Sdk
command: knightpac
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host
modules:
  - name: knightpac
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
    sources:
      - type: dir
        path: ../..
